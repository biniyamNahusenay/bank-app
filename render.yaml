services:
  - type: web
    name: bank-app-api
    runtime: java
    plan: free
    region: oregon
    rootDir: .
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/bank-app-0.0.1-SNAPSHOT.jar
    healthCheckPath: /health
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: bank-app-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: bank-app-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: bank-app-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: APP_JWT_SECRET
        generateValue: true

databases:
  - name: bank-app-db
    plan: free
    region: oregon
    databaseName: payment_db
    user: bankapp_user
